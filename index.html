*{

  padding:0;

}
body{

  min-height:100vh;
  display:flex;
  flex-direction:column;
}
:root{
  --main-red:#c82423;
  --light-gray:#fafafa;
  --text-gray:#777;
  --border-gray:#e8e8e8;
  --radius:14px;
}
.page{
  display:none;
  animation:fadeIn 0.3s ease;
}
.page.active{
  display:block;
}
@keyframes fadeIn{
  0%{opacity:0.4;transform:translateY(8px);}
  100%{opacity:1;transform:translateY(0);}
}
.main-logo{
  font-size:28px;
  color:var(--main-red);
  text-align:center;
  font-weight:bold;
  letter-spacing:2px;
  margin-bottom:8px;
}
.club-name{
  font-size:14px;
  color:#444;
  text-align:center;
  margin-bottom:6px;
}
.desc-text{
  font-size:14px;
  color:var(--text-gray);
  text-align:center;
  line-height:1.8;
  margin-bottom:30px;
  padding:0 6px;
}
.q-item{
  margin:24px 0;
  padding-bottom:16px;
  border-bottom:1px dashed var(--border-gray);
}
.q-title{
  font-size:15px;
  margin-bottom:10px;
  font-weight:500;
  color:#1a1a1a;
}
.opt{
  padding:16px 14px;
  border:1px solid var(--border-gray);
  border-radius:var(--radius);
  margin:9px 0;
  cursor:pointer;
  transition:all 0.2s ease;
  background:#fff;
  box-shadow:0 1px 2px rgba(0,0,0,0.02);
}
.opt:hover{
  border-color:#b0b0b0;
  background:#f5f5f5;
}
.opt:active{
  transform:scale(0.98);
}
.opt.active{
  background:var(--main-red);
  color:#fff;
  border-color:var(--main-red);
  box-shadow:0 4px 10px rgba(200,36,35,0.25);
}
.btn{
  width:100%;
  padding:16px 0;
  background:var(--main-red);
  color:#fff;
  border:none;
  border-radius:var(--radius);
  font-size:16px;
  font-weight:500;
  cursor:pointer;
  transition:all 0.2s ease;
  box-shadow:0 4px 12px rgba(200,36,35,0.25);
  letter-spacing:1px;
  margin-top:8px;
}
.btn:hover{
  background:#a81e1e;
  transform:translateY(-2px);
  box-shadow:0 6px 16px rgba(200,36,35,0.35);
}
.btn:active{
  transform:scale(0.97);
}
.result-card{
  background:#ffffff;
  border:1px solid var(--border-gray);
  padding:24px 16px 26px;
  border-radius:var(--radius);
  margin-top:18px;
  box-shadow:0 8px 24px rgba(0,0,0,0.04);
}
/* 图片尺寸：宽度70%，最大高度300，无圆角不变形完整显示 */
.avatar-img{
  max-width:70%;
  max-height:300px;
  width:auto;
  height:auto;
  display:block;
  margin:0 auto 10px;
  border-radius:0;
  object-fit:contain;
}
.avatar-img.hide{
  display:none;
}
.res-name{
  font-size:26px;
  font-weight:bold;
  color:var(--main-red);
  margin-top:10px;
  margin-bottom:6px;
  text-align:center;
}
.res-tip{
  font-size:12px;
  color:var(--text-gray);
  margin-bottom:14px;
  text-align:center;
}
.info-wrap{
  border:1px solid var(--main-red);
  border-radius:var(--radius);
  padding:14px;
  margin-bottom:16px;
}
.tag-label{
  font-size:15px;
  font-weight:500;
  color:var(--main-red);
  margin-bottom:6px;
  display:block;
}
#resDesc{
  font-size:15px;
  color:#333;
  line-height:1.8;
}
.split-line{
  margin:22px 0;
  border-top:1px solid var(--border-gray);
  padding-top:20px;
}
.book-item{
  margin:6px 0;
  font-size:14px;
  padding-left:4px;
}
.load-box{
  height:75vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:18px;
}
.load-text{
  font-size:18px;
  color:var(--main-red);
  font-weight:500;
  text-align:center;
}
.load-dot{
  display:inline-block;
  animation:dot 1.2s infinite;
}
@keyframes dot{
  0%{opacity:0.2}
  50%{opacity:1}
  100%{opacity:0.2}
}
.load-spinner{
  width:46px;
  height:46px;
  border:4px solid #e0e0e0;
  border-top:4px solid var(--main-red);
  border-radius:50%;

}
@keyframes spin{
  0%{transform:rotate(0deg);}
  100%{transform:rotate(360deg);}
}
.footer-note{
  margin-top:36px;
  text-align:center;
  font-size:12px;
  color:#aaa;
  border-top:1px solid #eee;
  padding-top:18px;
  letter-spacing:0.5px;

  document.getElementById(hideId).classList.remove('active');

}

function resetAllAndBackHome(){
  answerArr = [null,null,null,null,null,null,null,null];
  document.querySelectorAll('.opt').forEach(el => el.classList.remove('active'));
  document.getElementById("resName").innerText = "";

  document.getElementById("resDesc").innerText = "";
  document.getElementById("resQuote").innerText = "";
  document.getElementById("resBookList").innerHTML = "";
  const avatar = document.getElementById("avatarImage");
  avatar.classList.add('hide');
  avatar.style.display = "block";
  switchPage('page-result','page-home');
}

let answerArr = [null,null,null,null,null,null,null,null];

function renderQuestions(){
  const wrap = document.getElementById("questionWrap");
  wrap.innerHTML = "";
  for(let i=0;i<questionList.length;i++){
    const item = questionList[i];
    let div = document.createElement("div");
    div.className = "q-item";
    div.innerHTML = `<div class="q-title">${i+1}. ${item.title}</div>
    <div class="opt" onclick="selectOpt(${i},'A',this)">A. ${item.a}</div>
    <div class="opt" onclick="selectOpt(${i},'B',this)">B. ${item.b}</div>`;
    wrap.appendChild(div);
  }
}

function selectOpt(index,val,dom){
  dom.parentElement.querySelectorAll(".opt").forEach(o=>o.classList.remove('active'));
  dom.classList.add("active");
  answerArr[index] = val;
}

function startAnalyze(){
  if(answerArr.includes(null)){
    alert("请完成全部题目再提交");
    return;
  }
  switchPage('page-answer','page-loading');
  setTimeout(calcMBTI, 1200);
}

function calcMBTI(){
  // E/I 第1、5题
  let e=0,i=0;
  answerArr[0]==='A'?e++:i++;
  answerArr[4]==='A'?e++:i++;
  const D1 = e>=i?'E':'I';
  // S/N 第2、6题
  let s=0,n=0;
  answerArr[1]==='A'?s++:n++;
  answerArr[5]==='A'?s++:n++;
  const D2 = s>=n?'S':'N';
  // T/F 第3、7题
  let t=0,f=0;
  answerArr[2]==='A'?t++:f++;
  answerArr[6]==='A'?t++:f++;
  const D3 = t>=f?'T':'F';
  // J/P 第4、8题
  let j=0,p=0;
  answerArr[3]==='A'?j++:p++;
  answerArr[7]==='A'?j++:p++;
  const D4 = j>=p?'J':'P';
  const key = D1+D2+D3+D4;
  const data = personalityData[key];
  const img = document.getElementById("avatarImage");
  img.style.display = "block";
  img.src = data.imgSrc;
  img.classList.remove('hide');
  document.getElementById("resName").innerText = data.name;
  document.getElementById("resMbtiTip").innerText = data.guessTip;
  document.getElementById("resDesc").innerText = data.desc;
  document.getElementById("resQuote").innerText = data.quote;
  let bookHtml = "";
  data.books.forEach(b=> bookHtml += `<div class="book-item">📌 ${b}</div>`);
  document.getElementById("resBookList").innerHTML = bookHtml;
  switchPage('page-loading','page-result');
}

window.onload = function(){
  renderQuestions();
}
</script>
